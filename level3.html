<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - Pos 3: Sang Fotografer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    
    <div class="w-full h-[50vh] md:min-h-[500px] md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 hover:bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg transition flex items-center justify-center gap-2 border border-slate-200 w-max">⬅️ Kembali ke Gerbang Utama</a>
            
            <a href="level4.html" id="btn-lanjut-tp" class="bg-green-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg border border-green-600 hover:bg-green-600 transition animate-bounce hidden w-max">🚀 Lanjut ke Pos Terakhir (Pos 4)</a>

            <span id="view-label" class="bg-teal-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg uppercase tracking-wider w-max">📷 Posisi Kamera: Miring</span>
        </div>

        <div class="absolute top-4 right-4 z-10">
            <span id="progress-badge" class="bg-yellow-400 text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg border-2 border-white">⭐ 0/10 Terkumpul</span>
        </div>
    </div>
    
    <div class="w-full md:w-96 flex flex-col gap-4">
        
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-teal-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0 text-2xl">👩‍🏫</div>
                <div><h2 class="font-bold text-slate-800 uppercase tracking-tight">Bu Geo AI</h2><p class="text-[10px] text-teal-600 font-bold uppercase">Asisten Virtual Empatik</p></div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm italic overflow-y-auto max-h-32 transition-all leading-relaxed font-medium">"Memuat instruksi..."</div>
        </div>
        
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4 flex flex-col">
            <h3 class="font-extrabold text-slate-800 text-center text-xs tracking-wider" id="question-text">JIKA DIFOTO DARI ATAS, BAGAIMANA HASIL CETAK BIRUNYA?</h3>
            <div id="options-container" class="grid grid-cols-2 gap-3 min-h-[120px]"></div>
            
            <button id="next-btn" onclick="nextLevel()" class="w-full py-3 bg-teal-500 text-white rounded-xl font-bold text-xs shadow-lg hover:bg-teal-600 transition transform hover:-translate-y-1 hidden">➡️ OBYEK FOTO BERIKUTNYA</button>
        </div>
    </div>
    
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        function sendEvaluasiData(tpName, soalName, status, alatBantu = "Tanpa Alat") {
            const studentName = localStorage.getItem('geoquest_student_name') || "Anonim";
            fetch(GAS_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama: studentName, tp: tpName, soal: soalName, status: status, alatBantu: alatBantu })
            }).catch(err => console.error("Offline mode"));
        }

        let scene, camera, renderer, group;
        let isCorrect = false; let currentChallengeData = null; 
        let sudahMenjawabBenar = false;

        let correctCountTP3 = parseInt(localStorage.getItem('tp3_correct_count')) || 0;

        function speak(text, callback = null) {
            document.getElementById('chat-bubble').innerText = `"${text}"`;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID'; 
                utterance.pitch = 1.5; 
                utterance.rate = 1.05; 
                let voices = window.speechSynthesis.getVoices();
                let femaleVoice = voices.find(v => v.lang.includes('id') && v.name.toLowerCase().includes('female'));
                if(femaleVoice) utterance.voice = femaleVoice;
                utterance.onend = () => { if(callback) callback(); };
                window.speechSynthesis.speak(utterance);
            } else {
                if(callback) setTimeout(callback, 2000);
            }
        }

        function updateProgressBadge() {
            let badge = document.getElementById('progress-badge');
            let btnLanjut = document.getElementById('btn-lanjut-tp');
            if(correctCountTP3 >= 10) {
                badge.innerText = "⭐ POS SELESAI!";
                badge.classList.remove('bg-yellow-400', 'text-slate-800');
                badge.classList.add('bg-green-500', 'text-white', 'animate-pulse');
                btnLanjut.classList.remove('hidden');
            } else {
                badge.innerText = `⭐ ${correctCountTP3}/10 Terkumpul`;
                btnLanjut.classList.add('hidden');
            }
        }

        function generateDynamicChallenge() {
            let positions = []; let baseGrid = new Set(); baseGrid.add('0,0');
            let numBaseBlocks = Math.floor(Math.random() * 5) + 4; 
            let dirs = [{x:1,z:0}, {x:-1,z:0}, {x:0,z:1}, {x:0,z:-1}];
            
            for (let i = 1; i < numBaseBlocks; i++) {
                let existingBlocks = Array.from(baseGrid); 
                let anchor = existingBlocks[Math.floor(Math.random() * existingBlocks.length)].split(',');
                let dir = dirs[Math.floor(Math.random() * dirs.length)];
                let nx = parseInt(anchor[0]) + dir.x; let nz = parseInt(anchor[1]) + dir.z; 
                baseGrid.add(`${nx},${nz}`);
            }
            
            let hasStacking = false; 
            baseGrid.forEach(coord => {
                let [x, z] = coord.split(',').map(Number); 
                let height = Math.floor(Math.random() * 3) + 1; 
                if (height > 1) hasStacking = true;
                for(let y = 0; y < height; y++) { positions.push({x: x, y: y, z: z}); }
            });
            
            let minX = Math.min(...Array.from(baseGrid).map(c => parseInt(c.split(',')[0])));
            let maxX = Math.max(...Array.from(baseGrid).map(c => parseInt(c.split(',')[0])));
            let minZ = Math.min(...Array.from(baseGrid).map(c => parseInt(c.split(',')[1])));
            let maxZ = Math.max(...Array.from(baseGrid).map(c => parseInt(c.split(',')[1])));
            
            let cols = maxX - minX + 1; let rows = maxZ - minZ + 1;
            let shapeName = (baseGrid.size < (cols * rows)) ? "Susunan Gabungan" : "Balok Persegi";
            
            let correctMatrix = Array(rows).fill().map(() => Array(cols).fill(0));
            positions.forEach(p => correctMatrix[p.z - minZ][p.x - minX] = 1);
            
            let wrongMatrix = correctMatrix.map(row => [...row]); 
            let rz = Math.floor(Math.random() * rows); let rx = Math.floor(Math.random() * cols);
            wrongMatrix[rz][rx] = wrongMatrix[rz][rx] === 1 ? 0 : 1; 
            if(wrongMatrix.flat().every(v => v === 0)) wrongMatrix[0][0] = 1;
            
            return { positions, cols, rows, correctMatrix, wrongMatrix, hasStacking, shapeName };
        }

        function init() {
            updateProgressBadge();
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9); 
            const container = document.getElementById('canvas-container');
            
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000); 
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(container.clientWidth, container.clientHeight); 
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 
            const light = new THREE.DirectionalLight(0xffffff, 0.6); light.position.set(10, 20, 15); scene.add(light);
            
            group = new THREE.Group(); scene.add(group); loadLevel(true); animate();
            window.addEventListener('resize', () => { camera.aspect = container.clientWidth/container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
        }

        function loadLevel(isFirst = false) {
            group.clear(); 
            sudahMenjawabBenar = false;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('view-label').innerText = "📷 Posisi Kamera: Miring";
            
            currentChallengeData = generateDynamicChallenge(); 
            
            const material = new THREE.MeshLambertMaterial({ color: 0x14b8a6 }); 
            currentChallengeData.positions.forEach(p => {
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
                cube.add(new THREE.LineSegments(new THREE.EdgesGeometry(cube.geometry), new THREE.LineBasicMaterial({ color: 0x0f172a, linewidth: 2 })));
                cube.position.set(p.x, p.y, p.z); group.add(cube);
            });
            new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
            
            generateOptions(currentChallengeData); 
            
            let greetings = [
                "Bayangkan kamu sedang menerbangkan drone, lalu melihat bangunan ini lurus dari atas langit.",
                "Tebaklah bayangan dua dimensi dari benda ini jika difoto pakai kamera dari atas atapnya.",
                "Ayo jadi fotografer! Pilih gambar cetak biru yang sesuai."
            ];
            if (!isFirst) speak(greetings[Math.floor(Math.random() * greetings.length)]);
            else setTimeout(() => speak(greetings[0]), 1000);
        }

        function generateOptions(data) {
            const container = document.getElementById('options-container'); container.innerHTML = ''; 
            const correctPos = Math.random() > 0.5 ? 0 : 1;
            
            for(let i = 0; i < 2; i++) {
                const isThisCorrect = (i === correctPos); const matrix = isThisCorrect ? data.correctMatrix : data.wrongMatrix;
                const labelHuruf = String.fromCharCode(65+i);
                
                const btn = document.createElement('button'); 
                btn.className = "p-4 border-4 border-slate-100 rounded-2xl bg-white shadow-sm flex flex-col items-center justify-center gap-3 hover:border-teal-400 hover:bg-teal-50 transition-all";
                
                btn.onclick = function() { checkAnswer(isThisCorrect, this, labelHuruf); };
                
                let gridHTML = `<div style="display: grid; grid-template-columns: repeat(${data.cols}, 1fr); gap: 2px; background: #e2e8f0; padding: 4px; width: 80px; aspect-ratio: ${data.cols} / ${data.rows}; border-radius: 4px;">`;
                matrix.forEach(row => row.forEach(cell => gridHTML += `<div class="${cell === 1 ? 'bg-teal-500 border border-teal-700' : 'bg-transparent'} rounded-[2px]"></div>`));
                gridHTML += `</div><span class="font-bold text-[11px] text-slate-500 uppercase tracking-widest">Cetak Biru ${labelHuruf}</span>`;
                btn.innerHTML = gridHTML; container.appendChild(btn);
            }
        }

        function checkAnswer(correct, btnElement, labelHuruf) {
            if(sudahMenjawabBenar) return; 

            sendEvaluasiData("TP 3: Fotografer", currentChallengeData.shapeName, correct ? "Benar" : "Salah");
            
            let namaPanggilan = (localStorage.getItem('geoquest_student_name') || "").toLowerCase();
            
            if (correct) {
                sudahMenjawabBenar = true;
                correctCountTP3++;
                localStorage.setItem('tp3_correct_count', correctCountTP3);
                if(correctCountTP3 >= 10) localStorage.setItem('geoquest_tp3_done', 'true');
                updateProgressBadge();

                document.getElementById('options-container').style.pointerEvents = 'none';
                btnElement.classList.remove('border-slate-100', 'hover:border-teal-400', 'hover:bg-teal-50');
                btnElement.classList.add('bg-green-100', 'border-green-500', 'shadow-md'); 
                
                let txt = correctCountTP3 >= 10 ? 
                    `Selamat, ${namaPanggilan}! Kamu berhasil menjadi fotografer ahli dan mengumpulkan 10 Bintang!` :
                    `Keren sekali, ${namaPanggilan}! Foto dari langitmu sangat sempurna! Mari kita buktikan.`;
                
                speak(txt, () => { 
                    gsap.to(camera.position, { 
                        x: 0, y: 18, z: 0, duration: 2, 
                        onUpdate: () => camera.lookAt(0, 0, 0), 
                        onComplete: () => { 
                            document.getElementById('view-label').innerText = "📷 Posisi Kamera: Tampak Atas"; 
                            if(correctCountTP3 < 10) speak("Lihat, bentuk aslinya dari atas persis seperti cetak biru yang kamu pilih!");
                            document.getElementById('next-btn').classList.remove('hidden'); 
                        } 
                    }); 
                });
            } else {
                btnElement.disabled = true;
                btnElement.classList.remove('border-slate-100', 'hover:border-teal-400', 'hover:bg-teal-50');
                btnElement.classList.add('opacity-40', 'bg-red-50', 'border-red-300', 'cursor-not-allowed');
                
                let correctLabel = (labelHuruf === 'A') ? 'B' : 'A';

                // LOGIKA SALAH: MEMBERITAHU JAWABAN BENAR EKSPLISIT
                let txt = `Hampir pas! Jawaban yang benar adalah Cetak Biru ${correctLabel}. Ingat ya, jika dilihat dari atas langit, kita tidak bisa melihat tinggi bangunannya. Coba klik Cetak Biru ${correctLabel} untuk melihat buktinya!`;
                speak(txt, null);
            }
        }

        function nextLevel() { 
            document.getElementById('options-container').style.pointerEvents = 'auto'; 
            gsap.to(camera.position, { x: 10, y: 10, z: 10, duration: 1.5, onUpdate: () => camera.lookAt(0, 0, 0), onComplete: () => loadLevel(false) }); 
        }
        
        function animate() { 
            requestAnimationFrame(animate); 
            if(camera.position.y < 15) group.rotation.y += 0.005; 
            else group.rotation.y = 0; 
            renderer.render(scene, camera); 
        }
        init();
    </script>
</body>
</html>
